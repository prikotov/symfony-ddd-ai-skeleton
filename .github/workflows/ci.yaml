name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    name: make check
    runs-on: ubuntu-latest

    env:
      APP_ENV: test
      APP_DEBUG: 1
      APP_SECRET: ci-secret
      APP_DEFAULT_ID: console
      DATABASE_URL: "sqlite:///:memory:"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: sqlite3
          coverage: none
          tools: composer

      - name: Install and setup
        run: make setup

      - name: Run checks
        run: make check
